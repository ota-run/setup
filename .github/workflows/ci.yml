name: CI

on:
  push:
  pull_request:

jobs:
  repo:
    name: repo verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install ota
        shell: bash
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate contract
        run: ota validate

      - name: Verify
        run: ota run ci --stream
