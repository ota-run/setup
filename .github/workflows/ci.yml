name: CI

on:
  push:
  pull_request:

jobs:
  repo:
    name: repo verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install ota
        shell: bash
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate contract
        run: ota validate

      - name: Verify
        run: ota run ci --stream

  hosted-runner-smoke:
    name: setup smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup ota
        uses: ./
        with:
          install: always
          ota-version: 1.4.7

      - name: Verify ota on PATH
        shell: pwsh
        run: |
          $ota = Get-Command ota -ErrorAction Stop
          $version = & $ota.Source --version
          if (-not $version) {
            throw "ota --version produced no output"
          }
          Write-Host $version
