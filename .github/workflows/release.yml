name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install ota
        shell: bash
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify release candidate
        run: ota run ci --stream

      - name: Derive release tags
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          major_tag="$(printf '%s' "${RELEASE_TAG}" | cut -d. -f1)"

          if [[ ! "${major_tag}" =~ ^v[0-9]+$ ]]; then
            echo "Unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "major_tag=${major_tag}" >> "$GITHUB_OUTPUT"

      - name: Move major tag
        shell: bash
        env:
          MAJOR_TAG: ${{ steps.release.outputs.major_tag }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git tag -f "${MAJOR_TAG}" "${RELEASE_SHA}"
          git push origin "refs/tags/${MAJOR_TAG}" --force

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --latest
          else
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --generate-notes \
              --latest
          fi
