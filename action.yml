name: ota setup
description: Install ota in GitHub Actions and put it on PATH for later workflow steps.
author: ota.run

inputs:
  install:
    description: "Ota installation mode. Supported values: auto, always, never."
    required: false
    default: auto
  ota-version:
    description: Optional ota version to install through the official installer.
    required: false
  ota-bin:
    description: Ota binary name or path to use after installation resolution.
    required: false
    default: ota

outputs:
  ota-bin:
    description: Path to the ota binary selected by the action.
  ota-version:
    description: Resolved ota version reported by the selected binary.
  installed:
    description: Whether the action performed installation during this run.

runs:
  using: node24
  main: dist/index.js
