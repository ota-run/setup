version: 1
project:
  name: '@ota-run/setup'
  type: application
  description: Official GitHub Action for installing ota in GitHub Actions
tasks:
  ci:
    description: Validate the scaffolded repo contract
    notes: |
      Use this until the setup action implementation lands.
      It keeps the repository Ota-managed and ensures the shipped contract remains valid.
    run: ota validate
    safe_for_agent: true
execution:
  preferred: native
agent:
  default_task: ci
  safe_tasks:
    - ci
  verify_after_changes:
    - ci
  writable_paths:
    - README.md
    - CHANGELOG.md
    - ota.yaml
    - .gitignore
    - .github
  protected_paths:
    - LICENSE
  bootstrap:
    ota:
      note: Only install ota if it is missing and installation is approved.
      sh: curl -fsSL https://dist.ota.run/install.sh | sh
      powershell: irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Treat Ota as the default workflow for this repository.
    Use `ota validate` to verify the repo contract.
    Use `ota run ci` as the canonical verification path until the setup action implementation lands.
